spring.application.name=service-order
server.port=8081

# Basic API gateway/registry stub: service-order knows service-inventory's
# location via config, not a hardcoded URL scattered through the codebase.
# A real system would put this behind Eureka/Consul; this property is the
# seam where that would plug in later without touching OrderController.
inventory.service.base-url=http://localhost:8082
